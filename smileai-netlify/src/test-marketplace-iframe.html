<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Iframe Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            color: #888;
        }
        
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
        }
        
        .device {
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .device-label {
            text-align: center;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .phone {
            width: 390px;
        }
        
        .tablet {
            width: 768px;
        }
        
        .desktop {
            width: 1024px;
        }
        
        iframe {
            width: 100%;
            border: none;
            border-radius: 12px;
            background: white;
        }
        
        .phone iframe {
            height: 844px;
        }
        
        .tablet iframe {
            height: 700px;
        }
        
        .desktop iframe {
            height: 700px;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #0E7C86;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0A6B75;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        @media (max-width: 768px) {
            .tablet, .desktop {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 SmileVisionPro AI - Marketplace Preview</h1>
        <p>Testing iframe embedding at different screen sizes</p>
    </div>

    <div class="controls">
        <button class="btn btn-primary" onclick="reloadAll()">↻ Reload All</button>
        <button class="btn btn-secondary" onclick="toggleInstall()">⚡ Toggle State</button>
    </div>

    <div class="container">
        <!-- Mobile (390×844) -->
        <div class="device phone">
            <div class="device-label">📱 Mobile (390×844)</div>
            <iframe 
                id="phone-frame"
                src="https://www.smilevisionpro.ai/marketplace/"
                title="SmileVisionPro - Mobile"
            ></iframe>
        </div>

        <!-- Tablet (768×700) -->
        <div class="device tablet">
            <div class="device-label">📱 Tablet (768×700)</div>
            <iframe 
                id="tablet-frame"
                src="https://www.smilevisionpro.ai/marketplace/"
                title="SmileVisionPro - Tablet"
            ></iframe>
        </div>

        <!-- Desktop (1024×700) -->
        <div class="device desktop">
            <div class="device-label">💻 Desktop (1024×700)</div>
            <iframe 
                id="desktop-frame"
                src="https://www.smilevisionpro.ai/marketplace/"
                title="SmileVisionPro - Desktop"
            ></iframe>
        </div>
    </div>

    <script>
        function reloadAll() {
            document.getElementById('phone-frame').src = document.getElementById('phone-frame').src;
            document.getElementById('tablet-frame').src = document.getElementById('tablet-frame').src;
            document.getElementById('desktop-frame').src = document.getElementById('desktop-frame').src;
        }

        function toggleInstall() {
            // Post message to iframes to toggle install state
            const frames = document.querySelectorAll('iframe');
            frames.forEach(frame => {
                frame.contentWindow.postMessage({ action: 'toggle-install' }, '*');
            });
        }

        // Listen for messages from iframe
        window.addEventListener('message', (event) => {
            if (event.data.type === 'APP_READY') {
                console.log('✅ App ready:', event.data.source);
            }
        });
    </script>
</body>
</html>
